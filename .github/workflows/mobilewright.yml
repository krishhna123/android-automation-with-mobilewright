# https://mobilewright.dev/docs/getting-started/ci
name: Mobilewright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Download WDIO Native Demo APK
        run: |
          curl -sSfL -o app.apk \
            https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          script: |
            echo "=== Device connected ==="
            adb wait-for-device
            adb devices -l
            echo "=== Boot status ==="
            adb shell getprop sys.boot_completed
            echo "=== Memory ==="
            adb shell cat /proc/meminfo | head -5
            echo "=== Unlocking screen ==="
            adb shell wm dismiss-keyguard
            adb shell input keyevent 82 || true
            adb shell svc power stayon true
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0
            echo "=== Installing APK ==="
            adb install app.apk
            echo "=== Running tests ==="
            npx mobilewright test --reporter html

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: mobilewright-report
          path: mobilewright-report/
          retention-days: 30
