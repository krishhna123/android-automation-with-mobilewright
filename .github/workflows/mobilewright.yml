# https://mobilewright.dev/docs/getting-started/ci
# https://mobilewright.dev/docs/guides/docker
name: Mobilewright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download WDIO Native Demo APK
        run: |
          curl -sSfL -o app.apk \
            https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          script: |
            adb install -r app.apk
            docker build -t mobilewright-tests .
            docker run --rm \
              --add-host=host.docker.internal:host-gateway \
              -v "$PWD:/home/mwuser" \
              mobilewright-tests \
              npx mobilewright test --reporter html

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: mobilewright-report
          path: mobilewright-report/
          retention-days: 30
